hostname					"My Prop Hunt Server"
sv_password					""
sv_lan						0
sv_region					255

// if these configs somehow won't load from your server, try remove any comments that marked as '//'.
// Fore more info about all configs: 
// https://wiki.prophuntenhanced.xyz/#Config/Common_Server_Config+Common_Server_Config
// https://wiki.prophuntenhanced.xyz/#ConVars_and_ConCmds/Serverside_ConVars+Serverside_ConVars
// https://wiki.prophuntenhanced.xyz/#ConVars_and_ConCmds/MapVote_ConVars+MapVote_ConVars

p2p_enabled					0 // change this to 1 to enable P2P Mode.
p2p_friendsonly 			0 // change this to 1 to only allow Friends Only P2P mode.

// PH: Enhanced - Gameplay settings
ph_hunter_fire_penalty		10
ph_hunter_kill_bonus 		100
ph_hunter_smg_grenades		1   //grenades given to hunters, 0 = none
ph_swap_teams_every_round 	1   //leave this as default.
ph_game_time 				40  //minutes
ph_hunter_blindlock_time 	30  //seconds
ph_round_time 				300 //seconds
ph_rounds_per_map 			10
ph_waitforplayers			1
ph_min_waitforplayers 		1
ph_falldamage				1   //should players take fall damage?
ph_allow_prop_pickup		1   //0 = no one, 1 = everyone, 2 = hunters only

// Verbosely prints any events of Prop Hunt: Enhanced.
ph_print_verbose			1

// Server language (requires map change to take effect)
ph_language					"en"

// PH: Enhanced - Props/Player settings
ph_use_custom_plmodel			1
ph_use_custom_plmodel_for_prop	1
ph_use_playermodeltype			0
ph_enable_plnames				0
ph_prop_camera_collisions		1
ph_prop_collision				1
ph_enable_custom_taunts			1
ph_autotaunt_enabled			1
ph_customtaunts_delay			4
ph_normal_taunt_delay			3
ph_autotaunt_delay				45
ph_prop_jumppower				1.4
ph_hunter_jumppower				1   //multiplier for Hunter jump power, min. 1
ph_notice_prop_rotation			1
ph_enable_lucky_balls			1
ph_enable_devil_balls			1   //spawn Devil balls when a hunter dies?

// PH: Enhanced - Taunt Pitch settings
ph_tauntpitch_allowed			1   //allow players to pitch taunts up/down?
ph_tauntpitch_min				60  //0-100
ph_tauntpitch_max				180 //100-255

// PH: Enhanced - Team Balance & Rotation settings
ph_forcejoinbalancedteams		1   //force players to even out teams on join
ph_autoteambalance				1   //automatically even out teams at round start
ph_originalteambalance			0   //use PH:E's original auto-balancing (disables all settings below)
ph_rotateteams					0   //disable shuffle mode and rotate players instead
ph_huntercount					0   //fixed number of Hunters per round, 0 = automatic
ph_preventconsecutivehunting	1   //prevent being a Hunter twice in a row (shuffle mode only)
ph_forcespectatorstoplay		0   //include spectators when balancing teams

// PH: Enhanced - Unstuck system (F3 / !unstuck)
ph_unstuckrange					250 //should be a multiple of 5
ph_unstuck_waittime				5   //seconds between each unstuck attempt
ph_disabletpunstuckinround		0   //disable last-resort unstuck teleports outside of hiding phase

// PH: Enhanced - [EXPERIMENTAL] settings
ph_experimentalpropcollisions	0   //less strict prop collisions, may give big props a small hitbox
phe_check_props_boundaries		0   //[WIP] prevents getting stuck inside objects/walls

// PH: Enhanced - Developer/Misc settings
ph_mkbren_use_new_mdl			1   //use new model for Bren MK II Bonus Weapon (requires map restart)
ph_sv_enable_obb_modifier		1   //enable OBB Model Data Modifier
ph_reload_obb_setting_everyround	1   //reload OBB Model Data Modifier every round restart

// Freezecam Settings
ph_freezecam				1
ph_fc_use_single_sound		0
ph_fc_cue_path				"misc/freeze_cam.wav"

// PH: Enhanced - MapVote
mv_allowcurmap				1  // 1/0, allow current map or not
mv_cooldown					1  // 1/0, enable cooldown
mv_mapbeforerevote			2  // number of each map should be cooldown
mv_maplimit					30 // allow 30 maps listed in mapvotes
mv_rtvcount					3  // Minimum players to allow MapVote
mv_timelimit				30 // Time in seconds to begin voting before changing the most choosen maps.
mv_change_when_no_player	1  // 1/0, change the map after no players are left on the server

// Use map listing from ULX Mapvote? This convar will grab any whitelisted maps from your ULX Map List.
// 1 = use from ULX mapvote list (which you can whitelist them), 0 = use default maps/*.bsp directory listing.
mv_use_ulx_votemaps	0

// Map Prefixes to start with, for example: ph_ stands for Prop Hunt, de_ stands for CSS, etc...
mv_mapprefix		"ph_,de_,fy_,"
